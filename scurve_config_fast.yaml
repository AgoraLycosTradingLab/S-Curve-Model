run:
  seed: 42
  output_root: "SCurve/runs_fast"
  log_root: "SCurve/logs"

data:
  provider: "yfinance"
  sp500_csv: "SCurve/scurve/data/raw/SP500-listed-stocks.csv"
  nasdaq_csv: "SCurve/scurve/data/raw/nasdaq-listed-symbols.csv"
  universe_cap_buckets: []
  yfinance:
    history_start: "2012-01-01"
    report_delay_days: 45
    chunk_size: 50
    min_quarters: 1
    max_tickers: 250
  min_quarters: 8
  lag_days: 60
  price_min: 10.0
  market_cap_min_usd: 5000000000
  adv_dollar_min_usd: 50000000

fit:
  models: ["gompertz"]
  strict_parametric_only: true
  loss: "huber"
  f_scale: 1.0
  max_nfev: 2500
  nrmse_max: 0.30
  k_bounds_multiplier: [1.05, 10.0]
  r_bounds: [0.0001, 5.0]
  t0_pad_quarters: 2
  k_bound_eps: 0.001

gates:
  require_fit_ok: true
  reject_if_k_on_upper_bound: false

scoring:
  maturity_center: 0.50
  maturity_width: 0.20
  stage_weight: 0.55
  slope_weight: 0.25
  accel_weight: 0.20
  k_bound_penalty: 0.70

ranking:
  top_percentile: 0.20

risk:
  max_position_weight: 0.05
  sector_cap: 0.35
  vol_target_annual: 0.18
  use_vol_targeting: false

backtest:
  rebalance: "quarterly"
  cost_bps_per_trade: 20
  slippage_bps_per_trade: 5

valuation:
  enabled: false
  provider: "yfinance"

policy:
  us_only: true
  allowed_countries: ["UNITED STATES", "USA", "US"]
  exclude_tickers: []

overlay_mode: "A"

overlays:
  eps_revisions:
    enabled: false
    lookback_days: 90
    min_revision_z: 0.0

  breakout:
    enabled: false
    lookback_days: 126
    min_rel_strength: 0.0
    require_price_above_high: true

  market_filters:
    enabled: true
    min_mkt_cap_usd: 5000000000
    min_addv_usd: 50000000
    min_price: 10.0
